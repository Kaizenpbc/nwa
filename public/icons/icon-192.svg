<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Blue circle background -->
  <circle cx="96" cy="96" r="96" fill="#003876"/>
  <!-- Road perspective: two parallel lines converging to horizon -->
  <!-- Left road edge -->
  <polygon points="60,160 80,80 96,80 76,160" fill="white" opacity="0.95"/>
  <!-- Right road edge -->
  <polygon points="132,160 112,80 96,80 116,160" fill="white" opacity="0.95"/>
  <!-- Road surface between -->
  <polygon points="76,160 96,80 116,160" fill="white" opacity="0.3"/>
  <!-- Horizon line -->
  <line x1="72" y1="80" x2="120" y2="80" stroke="white" stroke-width="3" opacity="0.7"/>
  <!-- Center dashed line -->
  <line x1="96" y1="160" x2="96" y2="110" stroke="#f4c430" stroke-width="4" stroke-dasharray="12,8"/>
  <!-- NWA text -->
  <text x="96" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#f4c430" letter-spacing="3">NWA</text>
</svg>
